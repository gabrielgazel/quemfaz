[theme]
# Tema base claro
base = "light"
primaryColor = "#1B5E3A"
backgroundColor = "#FAFAF8"
secondaryBackgroundColor = "#E9F0EA"
textColor = "#1A1A1A"
baseRadius = "full"

# Fonte padrão: Fira Code (Google Fonts), com fallback monospace
font = "Fira Code:https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&display=swap, monospace"
codeFont = "Fira Code:https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&display=swap, monospace"

[theme.sidebar]
backgroundColor = "#E9F0EA"
secondaryBackgroundColor = "#FAFAF8"
textColor = "#1A1A1A"